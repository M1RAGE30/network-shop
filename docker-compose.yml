name: network-shop

x-api-env: &api-env
  DATABASE_URL: mysql://shopuser:shoppassword@db:3306/network_shop
  JWT_SECRET: ${JWT_SECRET:-dev-change-me}
  PORT: 3000
  NODE_ENV: development
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
  SEED_ON_START: ${SEED_ON_START:-true}
  DB_POOL_SIZE: 10

services:
  db:
    image: mariadb:11.4
    container_name: network_shop_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: network_shop
      MARIADB_USER: shopuser
      MARIADB_PASSWORD: shoppassword
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/mariadb.conf.d/99-network-shop.cnf:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: network_shop_api
    restart: unless-stopped
    environment: *api-env
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      db:
        condition: service_healthy

  shop:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: network_shop_web
    restart: unless-stopped
    environment:
      VITE_PROXY_TARGET: http://api:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/admin.html:/app/admin.html
      - ./frontend/public:/app/public
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    depends_on:
      - api

  admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: network_shop_admin
    restart: unless-stopped
    environment:
      VITE_PROXY_TARGET: http://api:3000
    ports:
      - "5174:5174"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/admin.html:/app/admin.html
      - ./frontend/public:/app/public
    command: ["npm", "run", "dev:admin", "--", "--host", "0.0.0.0"]
    depends_on:
      - api

  phpmyadmin:
    profiles: [tools]
    image: phpmyadmin:latest
    container_name: network_shop_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: shopuser
      PMA_PASSWORD: shoppassword
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
