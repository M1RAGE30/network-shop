name: networkshop

x-backend-env: &backend-env
  DATABASE_URL: mysql://${MYSQL_USER:-shopuser}:${MYSQL_PASSWORD:-shoppassword}@mysql:3306/${MYSQL_DATABASE:-network_shop}
  PORT: 3000
  NODE_ENV: development
  DB_POOL_SIZE: 10
  SEED_ON_START: ${SEED_ON_START:-true}
  FORCE_SEED: ${FORCE_SEED:-false}

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-network_shop}
      MYSQL_USER: ${MYSQL_USER:-shopuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-shoppassword}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/99-networkshop.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: networkshop/backend:dev
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment: *backend-env
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      mysql:
        condition: service_healthy

  storefront:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: networkshop/frontend:dev
    restart: unless-stopped
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      VITE_PROXY_TARGET: http://backend:3000
    ports:
      - "${STOREFRONT_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    depends_on:
      - backend

  admin-panel:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: networkshop/frontend:dev
    restart: unless-stopped
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      VITE_PROXY_TARGET: http://backend:3000
    ports:
      - "${ADMIN_PORT:-5174}:5174"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/admin.html:/app/admin.html
      - ./frontend/public:/app/public
    command: ["npm", "run", "dev:admin", "--", "--host", "0.0.0.0"]
    depends_on:
      - backend

  phpmyadmin:
    profiles: [tools]
    image: phpmyadmin:5.2
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-shopuser}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-shoppassword}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
